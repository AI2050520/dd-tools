<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>排班系统</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#e0e7ff;
      --accent:#06b6d4;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
      --bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;
      --text-muted:#64748b;--text-light:#94a3b8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:0 10px 40px rgba(0,0,0,.15);
      --radius:12px;--radius-sm:8px;--transition:.2s ease;
    }
    html{font-size:15px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    .hidden{display:none!important}
    .w-full{width:100%}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;cursor:pointer;transition:all var(--transition);white-space:nowrap}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-secondary{background:var(--border);color:var(--text)}
    .btn-secondary:hover{background:#cbd5e1}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-danger:hover{background:#dc2626}
    .btn-success{background:var(--success);color:#fff}
    .btn-success:hover{background:#059669}
    .btn-ghost{background:transparent;color:var(--text-muted);padding:6px 10px}
    .btn-ghost:hover{background:var(--border);color:var(--text)}
    .btn-sm{padding:5px 12px;font-size:.8rem}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-label{font-size:.8rem;font-weight:600;color:var(--text-muted)}
    .form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.875rem;color:var(--text);background:#fff;transition:border-color var(--transition),box-shadow var(--transition);outline:none}
    .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    select.form-control{cursor:pointer}
    #appContainer{min-height:100vh;display:flex;flex-direction:column;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .navbar{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .navbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:58px}
    .nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;color:var(--primary);flex-shrink:0}
    .nav-brand .brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center}
    .nav-brand .brand-icon svg{width:18px;height:18px;color:#fff}
    .nav-tabs{display:flex;gap:4px;margin-left:12px}
    .nav-tab{padding:6px 16px;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all var(--transition);border:none;background:transparent;display:flex;align-items:center;gap:6px}
    .nav-tab:hover{background:var(--bg);color:var(--text)}
    .nav-tab.active{background:var(--primary-light);color:var(--primary)}
    .nav-tab svg{width:16px;height:16px}
    .nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
    .back-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition)}
    .back-btn:hover{border-color:var(--primary);color:var(--primary)}
    .avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;cursor:pointer;color:#fff;font-weight:700;font-size:.875rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
    .main-content{flex:1;max-width:1400px;width:100%;margin:0 auto;padding:20px 16px}
    .week-nav{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;box-shadow:var(--shadow);flex-wrap:wrap}
    .week-nav-title{font-size:1rem;font-weight:700;color:var(--text);flex:1;text-align:center;min-width:120px}
    .week-nav-sub{font-size:.78rem;font-weight:400;color:var(--text-muted);margin-left:6px}
    .schedule-grid-wrapper{overflow-x:auto;padding-bottom:8px}
    .schedule-grid{display:grid;grid-template-columns:repeat(7,minmax(140px,1fr));gap:10px;min-width:980px}
    .day-col{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
    .day-col.today .day-header{background:linear-gradient(135deg,var(--primary),var(--accent))}
    .day-col.today .day-header *{color:#fff!important}
    .day-header{padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);text-align:center}
    .day-name{font-size:.78rem;font-weight:700;color:var(--text-muted)}
    .day-date{font-size:1.1rem;font-weight:800;color:var(--text);margin:2px 0}
    .day-count{font-size:.72rem;color:var(--text-light);background:rgba(0,0,0,.05);border-radius:10px;padding:1px 6px;display:inline-block}
    .day-shifts{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:120px}
    .shift-card{border-radius:8px;padding:8px 10px;border-left:3px solid var(--primary);background:var(--primary-light);cursor:pointer;transition:all var(--transition);position:relative}
    .shift-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
    .shift-card:hover .shift-actions{opacity:1}
    .shift-emp{font-size:.82rem;font-weight:700;color:var(--text)}
    .shift-time{font-size:.75rem;color:var(--text-muted);margin-top:2px}
    .shift-task{font-size:.72rem;color:var(--text-muted);background:rgba(255,255,255,.6);border-radius:4px;padding:2px 6px;margin-top:4px;display:inline-block}
    .shift-hours-badge{position:absolute;top:6px;right:8px;font-size:.7rem;font-weight:700;color:#fff;background:rgba(0,0,0,.25);border-radius:10px;padding:1px 6px}
    .shift-actions{position:absolute;bottom:6px;right:6px;display:flex;gap:3px;opacity:0;transition:opacity var(--transition)}
    .shift-act-btn{width:22px;height:22px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px}
    .shift-act-btn.edit{background:#e0e7ff;color:var(--primary)}
    .shift-act-btn.del{background:#fee2e2;color:var(--danger)}
    .add-shift-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px;margin:4px 8px 8px;border:1.5px dashed var(--border);border-radius:8px;background:transparent;color:var(--text-light);font-size:.8rem;cursor:pointer;transition:all var(--transition)}
    .add-shift-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
    .report-section{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
    .report-section-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .report-section-title svg{width:18px;height:18px;color:var(--primary)}
    .filter-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
    .preset-btns{display:flex;flex-wrap:wrap;gap:8px}
    .preset-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.8rem;font-weight:600;cursor:pointer;background:transparent;color:var(--text-muted);transition:all var(--transition)}
    .preset-btn:hover,.preset-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
    .emp-select-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .emp-chip{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:.82rem;font-weight:600;cursor:pointer;background:transparent;color:var(--text-muted);transition:all var(--transition);display:flex;align-items:center;gap:6px}
    .emp-chip.selected{color:#fff;border-color:transparent}
    .emp-chip .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
    .stats-table-wrapper{overflow-x:auto}
    .stats-table{width:100%;border-collapse:collapse;font-size:.875rem}
    .stats-table th,.stats-table td{padding:10px 14px;text-align:center;border-bottom:1px solid var(--border)}
    .stats-table th{background:var(--bg);font-weight:700;font-size:.78rem;color:var(--text-muted);position:sticky;top:0}
    .stats-table td:first-child,.stats-table th:first-child{text-align:left}
    .stats-table tr:hover td{background:#f8fafc}
    .stats-table .total-row td{font-weight:700;background:var(--primary-light);color:var(--primary);border-top:2px solid var(--primary)}
    .hours-cell{font-weight:600}
    .hours-bar-cell{min-width:120px}
    .hours-bar-wrap{display:flex;align-items:center;gap:8px}
    .hours-bar{height:6px;border-radius:3px;background:var(--border);flex:1}
    .hours-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width .5s ease}
    .emp-label{display:flex;align-items:center;gap:8px}
    .emp-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .summary-cards{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));margin-bottom:16px}
    .summary-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border-top:3px solid var(--primary)}
    .summary-card-value{font-size:1.8rem;font-weight:800;color:var(--text)}
    .summary-card-label{font-size:.78rem;color:var(--text-muted);margin-top:4px}
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
    #confirmModal{z-index:600}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .modal-box{background:var(--card);border-radius:16px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
    .modal-box.modal-sm{max-width:360px}
    .modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .modal-header h3{font-size:1.05rem;font-weight:700}
    .modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    .close-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all var(--transition)}
    .close-btn:hover{background:var(--border);color:var(--text)}
    .settings-section{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:20px}
    .settings-section:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
    .settings-section-title{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .emp-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;background:var(--bg);margin-bottom:6px}
    .emp-list-item .emp-name-display{display:flex;align-items:center;gap:8px;font-weight:600;font-size:.875rem}
    .confirm-msg{font-size:.9rem;color:var(--text-muted);line-height:1.6;text-align:center}
    #toastContainer{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:12px 18px;border-radius:10px;background:#1e293b;color:#fff;font-size:.875rem;font-weight:500;box-shadow:var(--shadow-lg);pointer-events:all;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;max-width:320px}
    .toast.success{background:var(--success)}
    .toast.error{background:var(--danger)}
    .toast.warning{background:var(--warning)}
    @keyframes toastIn{from{opacity:0;transform:translateY(20px)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(20px)}}
    @media(max-width:640px){
      .nav-brand span{display:none}
      .nav-tab span{display:none}
      .nav-tab{padding:6px 10px}
      .main-content{padding:12px 8px}
      .filter-grid{grid-template-columns:1fr}
      .summary-cards{grid-template-columns:1fr 1fr}
      #toastContainer{bottom:16px;right:16px;left:16px}
      .toast,.modal-box{max-width:100%}
      .modal-box{max-height:95vh}
    }
    @media(max-width:400px){.summary-cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="appContainer">
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="nav-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <span data-i18n="appName">排班系统</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" id="tabSchedule" onclick="switchTab('schedule')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span data-i18n="tabSchedule">排班表</span>
        </button>
        <button class="nav-tab" id="tabReports" onclick="switchTab('reports')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span data-i18n="tabReports">统计报表</span>
        </button>
      </div>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-sm" onclick="openSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span data-i18n="navSettings">设置</span>
        </button>
        <button class="btn btn-ghost btn-sm" id="langToggle" onclick="toggleLang()" style="font-weight:700;min-width:42px;letter-spacing:.5px">EN</button>
        <a class="back-btn" href="index.html" id="backBtn">← <span id="backLabel">工具箱</span></a>
        <button class="avatar-btn" onclick="doLogout()" title="退出登录">退</button>
      </div>
    </div>
  </nav>

  <div id="scheduleView" class="main-content">
    <div class="week-nav">
      <button class="btn btn-secondary btn-sm" onclick="navigateWeek(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg><span data-i18n="prevWeek">上周</span>
      </button>
      <div class="week-nav-title" id="weekRangeLabel">加载中…</div>
      <button class="btn btn-secondary btn-sm" onclick="navigateWeek(0)" style="margin-left:auto" data-i18n="thisWeek">本周</button>
      <button class="btn btn-secondary btn-sm" onclick="navigateWeek(1)"><span data-i18n="nextWeek">下周</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="btn btn-primary btn-sm" onclick="openQuickSchedule()" data-i18n="quickScheduleBtn">⚡ 快速排班</button>
      <button class="btn btn-secondary btn-sm" onclick="captureSchedule()" id="screenshotBtn" style="padding:5px 10px">📷</button>
      <button class="btn btn-secondary btn-sm" id="timeFmtBtn" onclick="toggleTimeFmt()" style="padding:5px 10px;font-size:.78rem;font-weight:700">AM/PM</button>
    </div>
    <div class="schedule-grid-wrapper">
      <div class="schedule-grid" id="scheduleGrid"></div>
    </div>
  </div>

  <div id="reportsView" class="main-content hidden">
    <div class="report-section">
      <div class="report-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg><span data-i18n="filterSection">筛选条件</span>
      </div>
      <div class="filter-grid" style="margin-bottom:16px">
        <div class="form-group"><label class="form-label" data-i18n="startDateLabel">开始日期</label><input type="date" class="form-control" id="reportStart" onchange="renderReports()"/></div>
        <div class="form-group"><label class="form-label" data-i18n="endDateLabel">结束日期</label><input type="date" class="form-control" id="reportEnd" onchange="renderReports()"/></div>
      </div>
      <div class="preset-btns">
        <button class="preset-btn active" data-preset="today" onclick="applyPreset('today',this)" data-i18n="presetToday">今天</button>
        <button class="preset-btn" data-preset="week" onclick="applyPreset('week',this)" data-i18n="presetWeek">本周</button>
        <button class="preset-btn" data-preset="2weeks" onclick="applyPreset('2weeks',this)" data-i18n="preset2Weeks">近两周</button>
        <button class="preset-btn" data-preset="month" onclick="applyPreset('month',this)" data-i18n="presetMonth">本月</button>
        <button class="preset-btn" data-preset="custom" onclick="applyPreset('custom',this)" data-i18n="presetCustom">自定义</button>
      </div>
    </div>
    <div class="report-section">
      <div class="report-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span data-i18n="selectEmpSection">选择员工</span>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toggleAllEmployees()" data-i18n="toggleAllBtn">全选/反选</button>
      </div>
      <div class="emp-select-list" id="empSelectList"></div>
    </div>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="report-section">
      <div class="report-section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        <span data-i18n="hoursSection">工时明细</span>
      </div>
      <div class="stats-table-wrapper">
        <table class="stats-table" id="statsTable">
          <thead id="statsTableHead"></thead>
          <tbody id="statsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay hidden" id="shiftModal">
  <div class="modal-box">
    <div class="modal-header"><h3 id="shiftModalTitle">添加班次</h3><button class="close-btn" onclick="closeModal('shiftModal')">✕</button></div>
    <div class="modal-body">

async function sha256(msg){const buf=new TextEncoder().encode(msg);const hash=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function padZ(n){return String(n).padStart(2,'0');}
function toDateStr(d){return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;}
function parseDate(str){const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);}
function getWeekStart(date){const d=new Date(date);const day=d.getDay();const diff=(day===0)?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function fmtMMDD(date){return `${padZ(date.getMonth()+1)}/${padZ(date.getDate())}`;}
function calcHours(start,end){const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=24*60;return Math.round(mins/60*10)/10;}
function fmtHours(h){if(h===0)return '—';return `${h}h`;}
function fmtTime(t24){
  if(timeFmt==='24h'||!t24)return t24;
  const[h,m]=t24.split(':').map(Number);
  const ampm=h<12?'AM':'PM';
  const h12=h%12||12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function toggleTimeFmt(){
  timeFmt=timeFmt==='24h'?'12h':'24h';
  localStorage.setItem('sched_time_fmt',timeFmt);
  document.getElementById('timeFmtBtn').textContent=timeFmt==='24h'?'AM/PM':'24H';
  renderSchedule();
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function getEmpColor(name){const emps=DB.getEmployees();const idx=emps.indexOf(name);return EMPLOYEE_COLORS[(idx<0?0:idx)%EMPLOYEE_COLORS.length];}

let currentWeekStart=null,editingShiftId=null;
function initSchedule(){currentWeekStart=getWeekStart(new Date());renderSchedule();}
function navigateWeek(dir){
  if(dir===0){currentWeekStart=getWeekStart(new Date());}
  else{const d=new Date(currentWeekStart);d.setDate(d.getDate()+dir*7);currentWeekStart=d;}
  renderSchedule();
}
function renderSchedule(){
  const ws=currentWeekStart;const we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('weekRangeLabel').innerHTML=`${fmtMMDD(ws)} — ${fmtMMDD(we)} <span class="week-nav-sub">${ws.getFullYear()}${t('yearSuffix')}</span>`;
  const shifts=DB.getShifts();const today=toDateStr(new Date());
  const grid=document.getElementById('scheduleGrid');grid.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);const dStr=toDateStr(d);const isToday=dStr===today;
    const dayShifts=shifts.filter(s=>s.date===dStr).sort((a,b)=>a.startTime.localeCompare(b.startTime));
    const col=document.createElement('div');col.className=`day-col${isToday?' today':''}`;
    const hdr=document.createElement('div');hdr.className='day-header';
    hdr.innerHTML=`<div class="day-name">${t('dayNames')[i]}</div><div class="day-date">${padZ(d.getDate())}</div><div class="day-count">${dayShifts.length?dayShifts.length+t('shifts'):t('noShifts')}</div>`;
    col.appendChild(hdr);
    const shiftsDiv=document.createElement('div');shiftsDiv.className='day-shifts';
    if(!dayShifts.length){const emp=document.createElement('div');emp.innerHTML=`<p style="font-size:.78rem;color:var(--text-light)">${t('noShiftsBody')}</p>`;shiftsDiv.appendChild(emp);}
    else{dayShifts.forEach(s=>{
      const color=getEmpColor(s.employeeName);const h=calcHours(s.startTime,s.endTime);
      const card=document.createElement('div');card.className='shift-card';
      card.style.cssText=`border-left-color:${color};background:${color}18`;
      card.innerHTML=`<div class="shift-hours-badge" style="background:${color}cc">${fmtHours(h)}</div><div class="shift-emp" style="color:${color}">${escHtml(s.employeeName)}</div><div class="shift-time">${fmtTime(s.startTime)} — ${fmtTime(s.endTime)}</div>${s.taskLabel?`<div class="shift-task">${escHtml(s.taskLabel)}</div>`:''}<div class="shift-actions"><button class="shift-act-btn edit" onclick="event.stopPropagation();editShift('${s.id}')">✎</button><button class="shift-act-btn del" onclick="event.stopPropagation();deleteShift('${s.id}')">✕</button></div>`;
      card.addEventListener('click',()=>editShift(s.id));shiftsDiv.appendChild(card);
    });}
    col.appendChild(shiftsDiv);
    const addBtn=document.createElement('button');addBtn.className='add-shift-btn';
    addBtn.innerHTML=`<span style="font-size:1.1rem;line-height:1">+</span> ${t('addShiftBtn')}`;
    addBtn.addEventListener('click',()=>openAddShift(dStr));col.appendChild(addBtn);
    grid.appendChild(col);
  }
}
function openAddShift(dateStr){editingShiftId=null;document.getElementById('shiftModalTitle').textContent=t('addShiftTitle');document.getElementById('shiftDate').value=dateStr||toDateStr(new Date());document.getElementById('shiftStart').value='09:00';document.getElementById('shiftEnd').value='18:00';document.getElementById('shiftTask').value='';document.getElementById('shiftError').classList.add('hidden');populateEmpSelect();openModal('shiftModal');}
function editShift(id){const shift=DB.getShifts().find(s=>s.id===id);if(!shift)return;editingShiftId=id;document.getElementById('shiftModalTitle').textContent=t('editShiftTitle');populateEmpSelect(shift.employeeName);document.getElementById('shiftDate').value=shift.date;document.getElementById('shiftStart').value=shift.startTime;document.getElementById('shiftEnd').value=shift.endTime;document.getElementById('shiftTask').value=shift.taskLabel||'';document.getElementById('shiftError').classList.add('hidden');openModal('shiftModal');}
function populateEmpSelect(selected){const sel=document.getElementById('shiftEmp');sel.innerHTML=DB.getEmployees().map(e=>`<option value="${escHtml(e)}"${e===selected?' selected':''}>${escHtml(e)}</option>`).join('');}
function saveShift(){
  const emp=document.getElementById('shiftEmp').value.trim(),date=document.getElementById('shiftDate').value,start=document.getElementById('shiftStart').value,end=document.getElementById('shiftEnd').value,task=document.getElementById('shiftTask').value.trim(),errEl=document.getElementById('shiftError');
  if(!emp||!date||!start||!end){errEl.textContent=t('errFillAll');errEl.classList.remove('hidden');return;}
  if(start===end){errEl.textContent=t('errSameTime');errEl.classList.remove('hidden');return;}
  errEl.classList.add('hidden');const shifts=DB.getShifts();
  if(editingShiftId){const idx=shifts.findIndex(s=>s.id===editingShiftId);if(idx>-1)shifts[idx]={...shifts[idx],employeeName:emp,date,startTime:start,endTime:end,taskLabel:task};showToast(t('toastUpdated'),'success');}
  else{shifts.push({id:uid(),employeeName:emp,date,startTime:start,endTime:end,taskLabel:task});showToast(t('toastAdded'),'success');}
  DB.saveShifts(shifts);closeModal('shiftModal');renderSchedule();renderReports();
}
function deleteShift(id){openConfirm(t('delShiftTitle'),t('delShiftMsg'),()=>{DB.saveShifts(DB.getShifts().filter(s=>s.id!==id));renderSchedule();renderReports();showToast(t('toastDeleted'),'success');});}

let selectedEmployees=new Set(),currentPreset='today';
function initReports(){applyPreset('today',document.querySelector('[data-preset="today"]'),false);renderEmpSelectList();}
function applyPreset(preset,btn,doRender=true){
  currentPreset=preset;document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');
  const today=new Date();let start,end;
  if(preset==='today'){start=end=toDateStr(today);}
  else if(preset==='week'){const ws=getWeekStart(today);const we=new Date(ws);we.setDate(we.getDate()+6);start=toDateStr(ws);end=toDateStr(we);}
  else if(preset==='2weeks'){const ws=getWeekStart(today);const we=new Date(ws);we.setDate(we.getDate()+13);start=toDateStr(new Date(ws));end=toDateStr(we);}
  else if(preset==='month'){const y=today.getFullYear(),m=today.getMonth();start=toDateStr(new Date(y,m,1));end=toDateStr(new Date(y,m+1,0));}
  else{if(doRender)renderReports();return;}
  if(preset!=='custom'){document.getElementById('reportStart').value=start;document.getElementById('reportEnd').value=end;}
  if(doRender)renderReports();
}
function renderEmpSelectList(){
  const emps=DB.getEmployees();emps.forEach(e=>selectedEmployees.add(e));
  const container=document.getElementById('empSelectList');container.innerHTML='';
  emps.forEach((e,i)=>{const color=getEmpColorByIndex(i);const chip=document.createElement('button');chip.className=`emp-chip${selectedEmployees.has(e)?' selected':''}`;if(selectedEmployees.has(e))chip.style.background=color;chip.dataset.emp=e;chip.innerHTML=`<span class="dot"></span>${escHtml(e)}`;chip.addEventListener('click',()=>toggleEmpFilter(e,chip,color));container.appendChild(chip);});
}
function toggleEmpFilter(name,chip,color){if(selectedEmployees.has(name)){selectedEmployees.delete(name);chip.classList.remove('selected');chip.style.background='';}else{selectedEmployees.add(name);chip.classList.add('selected');chip.style.background=color;}renderReports();}
function toggleAllEmployees(){const emps=DB.getEmployees();const allSelected=emps.every(e=>selectedEmployees.has(e));if(allSelected)selectedEmployees.clear();else emps.forEach(e=>selectedEmployees.add(e));renderEmpSelectList();renderReports();}
function renderReports(){
  const startStr=document.getElementById('reportStart').value,endStr=document.getElementById('reportEnd').value;if(!startStr||!endStr)return;
  const startD=parseDate(startStr),endD=parseDate(endStr);if(startD>endD){showToast(t('toastDateErr'),'error');return;}
  const shifts=DB.getShifts(),emps=DB.getEmployees(),selEmps=emps.filter(e=>selectedEmployees.has(e));
  const dates=[];for(let d=new Date(startD);d<=endD;d.setDate(d.getDate()+1))dates.push(toDateStr(new Date(d)));
  const inRange=shifts.filter(s=>s.date>=startStr&&s.date<=endStr&&selectedEmployees.has(s.employeeName));
  const empTotals={};selEmps.forEach(e=>{empTotals[e]=0;});
  const empDayMap={};selEmps.forEach(e=>{empDayMap[e]={};});
  inRange.forEach(s=>{const h=calcHours(s.startTime,s.endTime);empTotals[s.employeeName]=(empTotals[s.employeeName]||0)+h;if(!empDayMap[s.employeeName][s.date])empDayMap[s.employeeName][s.date]=0;empDayMap[s.employeeName][s.date]+=h;});
  const totalShifts=inRange.length,totalHours=Object.values(empTotals).reduce((a,b)=>a+b,0),maxEmpHours=Math.max(...Object.values(empTotals),1);
  document.getElementById('summaryCards').innerHTML=`<div class="summary-card"><div class="summary-card-value">${totalShifts}</div><div class="summary-card-label">${t('summaryShifts')}</div></div><div class="summary-card" style="border-top-color:var(--accent)"><div class="summary-card-value">${totalHours.toFixed(1)}h</div><div class="summary-card-label">${t('summaryHours')}</div></div><div class="summary-card" style="border-top-color:var(--success)"><div class="summary-card-value">${selEmps.length}</div><div class="summary-card-label">${t('summaryEmps')}</div></div><div class="summary-card" style="border-top-color:var(--warning)"><div class="summary-card-value">${selEmps.length?(totalHours/selEmps.length).toFixed(1)+'h':'—'}</div><div class="summary-card-label">${t('summaryAvg')}</div></div>`;
  const showDays=dates.length<=14;
  const thead=document.getElementById('statsTableHead'),tbody=document.getElementById('statsTableBody');
  let headHtml=`<tr><th>${t('empCol')}</th>`;
  if(showDays){const dn=t('dayNames'),mn=t('monthNames');dates.forEach(ds=>{const d=parseDate(ds);const dateStr=currentLang==='zh'?`${mn[d.getMonth()]}${d.getDate()}日`:`${mn[d.getMonth()]} ${d.getDate()}`;headHtml+=`<th>${dateStr}<br><span style="color:var(--text-light);font-weight:400">${dn[(d.getDay()+6)%7]}</span></th>`;});}
  headHtml+=`<th>${t('shiftsCol')}</th><th>${t('totalHoursCol')}</th><th style="min-width:160px">${t('hoursRatioCol')}</th></tr>`;
  thead.innerHTML=headHtml;
  let bodyHtml='',colTotals=dates.map(()=>0),grandTotalShifts=0,grandTotalHours=0;
  selEmps.forEach((e,ei)=>{const color=getEmpColorByIndex(emps.indexOf(e)),empShifts=inRange.filter(s=>s.employeeName===e),empH=empTotals[e]||0;grandTotalShifts+=empShifts.length;grandTotalHours+=empH;const pct=maxEmpHours>0?(empH/maxEmpHours*100).toFixed(0):0;bodyHtml+=`<tr><td><div class="emp-label"><div class="emp-color-dot" style="background:${color}"></div><span style="font-weight:600">${escHtml(e)}</span></div></td>`;if(showDays)dates.forEach((ds,di)=>{const h=empDayMap[e][ds]||0;colTotals[di]+=h;bodyHtml+=`<td class="hours-cell">${h>0?fmtHours(h):'<span style="color:var(--text-light)">—</span>'}</td>`;});bodyHtml+=`<td>${empShifts.length}</td><td style="color:${color};font-weight:700">${fmtHours(empH)}</td><td><div class="hours-bar-wrap"><div class="hours-bar" style="background:${color}22"><div class="hours-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}99)"></div></div><span style="font-size:.75rem;color:var(--text-muted);min-width:30px">${pct}%</span></div></td></tr>`;});
  if(selEmps.length>0){bodyHtml+=`<tr class="total-row"><td><strong>${t('totalRow')}</strong></td>`;if(showDays)colTotals.forEach(h=>{bodyHtml+=`<td>${h>0?fmtHours(h):'—'}</td>`;});bodyHtml+=`<td>${grandTotalShifts}</td><td>${fmtHours(grandTotalHours)}</td><td>100%</td></tr>`;}
  if(selEmps.length===0){const cols=showDays?dates.length+4:4;bodyHtml=`<tr><td colspan="${cols}" style="text-align:center;padding:40px;color:var(--text-muted)">${t('noEmpMsg')}</td></tr>`;}
  tbody.innerHTML=bodyHtml;
}

function openSettings(){renderEmpMgmtList();['curPw','newPw','newPw2'].forEach(id=>document.getElementById(id).value='');document.getElementById('pwChangeError').classList.add('hidden');document.getElementById('newEmpName').value='';document.getElementById('empMgmtError').classList.add('hidden');openModal('settingsModal');}
function openQuickSchedule(){
  const emps=DB.getEmployees();if(emps.length===0){showToast(t('toastNoEmp'),'warning');return;}
  document.getElementById('quickEmp').innerHTML=emps.map(e=>`<option value="${escHtml(e)}">${escHtml(e)}</option>`).join('');
  const boxes=document.getElementById('quickDayBoxes');boxes.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(currentWeekStart);d.setDate(d.getDate()+i);const dStr=toDateStr(d);
    const lbl=document.createElement('label');lbl.style.cssText='display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s';lbl.dataset.date=dStr;
    const cb=document.createElement('input');cb.type='checkbox';cb.value=dStr;cb.style.display='none';
    cb.addEventListener('change',()=>{if(cb.checked){lbl.style.background='var(--primary)';lbl.style.color='#fff';lbl.style.borderColor='var(--primary)';}else{lbl.style.background='';lbl.style.color='';lbl.style.borderColor='var(--border)';}});
    lbl.appendChild(cb);lbl.appendChild(document.createTextNode(`${t('dayNames')[i]} ${fmtMMDD(d)}`));boxes.appendChild(lbl);
  }
  document.getElementById('quickStart').value='09:00';document.getElementById('quickEnd').value='18:00';document.getElementById('quickTask').value='';document.getElementById('quickError').classList.add('hidden');openModal('quickModal');
}
function saveQuickSchedule(){
  const emp=document.getElementById('quickEmp').value,start=document.getElementById('quickStart').value,end=document.getElementById('quickEnd').value,task=document.getElementById('quickTask').value.trim(),checkedDates=Array.from(document.querySelectorAll('#quickDayBoxes input:checked')).map(cb=>cb.value),errEl=document.getElementById('quickError');
  if(!emp){errEl.textContent=t('errSelectEmp');errEl.classList.remove('hidden');return;}
  if(!checkedDates.length){errEl.textContent=t('errSelectDay');errEl.classList.remove('hidden');return;}
  if(!start||!end){errEl.textContent=t('errFillTime');errEl.classList.remove('hidden');return;}
  if(start===end){errEl.textContent=t('errSameTime2');errEl.classList.remove('hidden');return;}
  errEl.classList.add('hidden');const shifts=DB.getShifts();
  checkedDates.forEach(date=>{shifts.push({id:uid(),employeeName:emp,date,startTime:start,endTime:end,taskLabel:task});});
  DB.saveShifts(shifts);closeModal('quickModal');renderSchedule();showToast(t('toastQuickAdded').replace('%d',checkedDates.length).replace('%s',emp),'success');
}
async function changePassword(){
  const cur=document.getElementById('curPw').value,np=document.getElementById('newPw').value,np2=document.getElementById('newPw2').value;
  if(!cur||!np||!np2){showPwErr(t('errPwAll'));return;}if(np.length<6){showPwErr(t('errPwLen'));return;}if(np!==np2){showPwErr(t('errPwMatch'));return;}
  const curHash=await sha256(cur);if(curHash!==DB.getPwHash()){showPwErr(t('errPwWrong'));return;}
  DB.setPwHash(await sha256(np));document.getElementById('pwChangeError').classList.add('hidden');showToast(t('toastPwOk'),'success');['curPw','newPw','newPw2'].forEach(id=>document.getElementById(id).value='');
}
function showPwErr(msg){const el=document.getElementById('pwChangeError');el.textContent=msg;el.classList.remove('hidden');}
function renderEmpMgmtList(){const emps=DB.getEmployees(),list=document.getElementById('empMgmtList');if(!emps.length){list.innerHTML=`<p style="font-size:.85rem;color:var(--text-muted)">${t('noEmpInList')}</p>`;return;}list.innerHTML=emps.map((e,i)=>`<div class="emp-list-item"><div class="emp-name-display"><div style="width:12px;height:12px;border-radius:50%;background:${getEmpColorByIndex(i)};flex-shrink:0"></div>${escHtml(e)}</div><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeEmployee('${escHtml(e)}')">${t('delEmpBtn')}</button></div>`).join('');}
function addEmployee(){const input=document.getElementById('newEmpName'),errEl=document.getElementById('empMgmtError'),name=input.value.trim();if(!name){errEl.textContent=t('errEmpEmpty');errEl.classList.remove('hidden');return;}const emps=DB.getEmployees();if(emps.includes(name)){errEl.textContent=t('errEmpExists');errEl.classList.remove('hidden');return;}emps.push(name);DB.saveEmployees(emps);input.value='';errEl.classList.add('hidden');renderEmpMgmtList();renderEmpSelectList();showToast(t('toastEmpAdded').replace('%s',name),'success');}
function removeEmployee(name){openConfirm(t('delEmpTitle'),t('delEmpMsg').replace('%s',name),()=>{DB.saveEmployees(DB.getEmployees().filter(e=>e!==name));selectedEmployees.delete(name);renderEmpMgmtList();renderEmpSelectList();renderReports();showToast(t('toastEmpDeleted').replace('%s',name),'success');});}
function exportData(){const data={version:1,exportedAt:new Date().toISOString(),employees:DB.getEmployees(),shifts:DB.getShifts()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`排班数据_${toDateStr(new Date())}.json`;a.click();URL.revokeObjectURL(url);showToast(t('toastExported'),'success');}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.employees||!data.shifts)throw new Error();DB.saveEmployees(data.employees);DB.saveShifts(data.shifts);renderSchedule();renderEmpSelectList();renderReports();showToast(t('toastImported'),'success');}catch{showToast(t('toastImportFail'),'error');}};reader.readAsText(file);event.target.value='';}
function clearAllData(){openConfirm(t('clearTitle'),t('clearMsg'),()=>{DB.saveShifts([]);renderSchedule();renderReports();showToast(t('toastCleared'),'success');});}

function switchTab(tab){
  document.getElementById('tabSchedule').classList.toggle('active',tab==='schedule');
  document.getElementById('tabReports').classList.toggle('active',tab==='reports');
  document.getElementById('scheduleView').classList.toggle('hidden',tab!=='schedule');
  document.getElementById('reportsView').classList.toggle('hidden',tab!=='reports');
  if(tab==='reports')renderReports();
}
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
let confirmCallback=null;
function openConfirm(title,msg,cb){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').textContent=msg;confirmCallback=cb;openModal('confirmModal');}
document.getElementById('confirmOkBtn').addEventListener('click',()=>{closeModal('confirmModal');if(confirmCallback){confirmCallback();confirmCallback=null;}});
['shiftModal','confirmModal','settingsModal','quickModal'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))closeModal(id);});});

function showToast(msg,type='default'){const container=document.getElementById('toastContainer');const toast=document.createElement('div');const icon=type==='success'?'✅':type==='error'?'❌':type==='warning'?'⚠️':'ℹ️';toast.className=`toast ${type}`;toast.innerHTML=`<span>${icon}</span><span>${escHtml(msg)}</span>`;container.appendChild(toast);setTimeout(()=>{toast.style.animation='toastOut .3s ease forwards';setTimeout(()=>toast.remove(),300);},2800);}

async function captureSchedule(){
  const btn=document.getElementById('screenshotBtn');btn.textContent='⏳';btn.disabled=true;
  try{
    const grid=document.getElementById('scheduleGrid');
    const label=document.getElementById('weekRangeLabel').innerText;
    const fileName=`排班表_${label.replace(/[\/\\:*?"<>|]/g,'-')}.png`;
    const canvas=await html2canvas(grid,{backgroundColor:'#f1f5f9',scale:2,useCORS:true,scrollX:0,scrollY:0,width:grid.scrollWidth,windowWidth:grid.scrollWidth+40});
    const dataUrl=canvas.toDataURL('image/png');

    // Mobile: try native share sheet (user can save directly to Photos)
    if(typeof navigator.canShare==='function'){
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
      const file=new File([blob],fileName,{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:'排班表'});
          btn.textContent='📷';btn.disabled=false;return;
        }catch(e){
          if(e.name==='AbortError'){btn.textContent='📷';btn.disabled=false;return;}
        }
      }
    }
    // Desktop or fallback: show preview modal
    showImageModal(dataUrl,fileName);
  }catch(e){showToast('截图失败：'+e.message,'error');}
  btn.textContent='📷';btn.disabled=false;
}
function showImageModal(dataUrl,fileName){
  const ov=document.createElement('div');
  ov.id='imgPreviewOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px';
  const bar=document.createElement('div');
  bar.style.cssText='display:flex;gap:10px;align-items:center;flex-shrink:0';
  bar.innerHTML=`<a href="${dataUrl}" download="${fileName}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">💾 保存 / 下载</a><button class="btn btn-ghost btn-sm" style="color:#fff;border:1px solid rgba(255,255,255,.3)" onclick="document.getElementById('imgPreviewOverlay').remove();event.stopPropagation()">✕ 关闭</button>`;
  const hint=document.createElement('p');
  hint.style.cssText='color:rgba(255,255,255,.55);font-size:.78rem;text-align:center;flex-shrink:0';
  hint.textContent='手机：长按图片 → 存储到相册 · 电脑：点"保存/下载"或右键图片另存为';
  const img=document.createElement('img');
  img.src=dataUrl;
  img.style.cssText='max-width:100%;max-height:calc(100vh - 140px);border-radius:8px;object-fit:contain;display:block';
  img.addEventListener('click',e=>e.stopPropagation());
  ov.appendChild(bar);ov.appendChild(hint);ov.appendChild(img);
  ov.addEventListener('click',()=>ov.remove());
  document.body.appendChild(ov);
}

function seedSampleData(){if(DB.getEmployees().length>0)return;const emps=['张伟','李娜','王芳','赵磊','陈静'];DB.saveEmployees(emps);const shifts=[],ws=getWeekStart(new Date()),tasks=['前台接待','配送','仓库管理','客服','培训','设备维护',''],tmpls=[{s:'08:00',e:'16:00'},{s:'09:00',e:'18:00'},{s:'10:00',e:'19:00'},{s:'12:00',e:'20:00'},{s:'08:30',e:'17:30'}];for(let w=0;w>=-1;w--){for(let d=0;d<7;d++){const date=new Date(ws);date.setDate(date.getDate()+w*7+d);const dStr=toDateStr(date);emps.forEach((emp,ei)=>{if(Math.random()<0.82){const tmpl=tmpls[(ei+d)%tmpls.length];shifts.push({id:uid(),employeeName:emp,date:dStr,startTime:tmpl.s,endTime:tmpl.e,taskLabel:tasks[Math.floor(Math.random()*tasks.length)]});}});}}DB.saveShifts(shifts);}

(async function startup(){
  await DB.loadFromCloud();
  if(!DB.getPwHash())DB.setPwHash(await sha256(DEFAULT_PASSWORD));
  seedSampleData();
  applyI18n();
  document.getElementById('timeFmtBtn').textContent=timeFmt==='24h'?'AM/PM':'24H';
  initSchedule();
  initReports();
})();
</script>
