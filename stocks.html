<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>股市追踪</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#e0e7ff;
      --accent:#06b6d4;--danger:#ef4444;--success:#10b981;--warning:#f59e0b;
      --bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;
      --text-muted:#64748b;--text-light:#94a3b8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:0 10px 40px rgba(0,0,0,.15);
      --radius:12px;--radius-sm:8px;--transition:.2s ease;
    }
    html{font-size:15px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .hidden{display:none!important}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
    .btn-ghost{background:transparent;color:var(--text-muted);padding:6px 10px}
    .btn-ghost:hover{background:var(--border);color:var(--text)}
    .btn-sm{padding:5px 12px;font-size:.8rem}
    .navbar{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .navbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:12px;height:58px}
    .nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;color:var(--primary);text-decoration:none}
    .brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center}
    .brand-icon svg{width:18px;height:18px;color:#fff}
    .nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
    .back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition)}
    .back-btn:hover{border-color:var(--primary);color:var(--primary)}
    .avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;cursor:pointer;color:#fff;font-weight:700;font-size:.875rem;display:flex;align-items:center;justify-content:center}
    .main-content{max-width:900px;width:100%;margin:0 auto;padding:20px 16px}
    .stocks-header{background:linear-gradient(135deg,#064e3b,#065f46);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .stocks-header h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
    .stocks-header p{font-size:.82rem;opacity:.8}
    .next-brief{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:600;text-align:center;white-space:nowrap}
    .next-brief-label{font-size:.7rem;opacity:.7;margin-bottom:2px}
    .refresh-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
    .refresh-btn:hover{background:rgba(255,255,255,.3)}
    /* Tabs */
    .tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow)}
    .tab-btn{flex:1;padding:9px 12px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;cursor:pointer;transition:all var(--transition);background:transparent;color:var(--text-muted)}
    .tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.3)}
    /* Alert cards */
    .alert-list{display:flex;flex-direction:column;gap:12px}
    .alert-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
    .alert-card.breaking{border-left-color:var(--danger)}
    .alert-card.scheduled{border-left-color:var(--accent)}
    .alert-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .alert-badge{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}
    .alert-badge.breaking{background:#fee2e2;color:var(--danger)}
    .alert-badge.scheduled{background:#cffafe;color:#0891b2}
    .alert-time{font-size:.78rem;color:var(--text-muted)}
    .alert-source{font-size:.78rem;color:var(--text-light);background:var(--bg);border-radius:6px;padding:1px 7px}
    .alert-headline{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4}
    .alert-analysis{font-size:.82rem;color:var(--text-muted);line-height:1.6;background:var(--bg);border-radius:8px;padding:10px 12px}
    .imp-bar{display:inline-flex;gap:2px}
    .imp-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
    .imp-dot.filled{background:#f59e0b}
    /* Position cards */
    .pos-card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid #8b5cf6}
    .pos-card.congress{border-left-color:#f59e0b}
    .pos-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .pos-badge{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px}
    .pos-badge.insider{background:#ede9fe;color:#7c3aed}
    .pos-badge.congress{background:#fef3c7;color:#d97706}
    .pos-ticker{display:inline-block;background:var(--primary-light);color:var(--primary);font-weight:700;font-size:.82rem;padding:2px 9px;border-radius:6px}
    .pos-headline{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4}
    .pos-detail{font-size:.82rem;color:var(--text-muted);background:var(--bg);border-radius:8px;padding:8px 12px;line-height:1.6}
    .txt-buy{color:var(--success);font-weight:700}
    .txt-sell{color:var(--danger);font-weight:700}
    /* Common */
    .stocks-empty{text-align:center;padding:60px 20px;color:var(--text-light)}
    .stocks-empty .empty-icon{font-size:3rem;margin-bottom:12px}
    .loading{text-align:center;padding:40px;color:var(--text-muted)}
    /* ── Analysis Tab ── */
    .analysis-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));margin-bottom:14px}
    .data-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--border)}
    .data-card.up{border-top-color:var(--success)}.data-card.up .data-card-value{color:var(--success)}
    .data-card.down{border-top-color:var(--danger)}.data-card.down .data-card-value{color:var(--danger)}
    .data-card-label{font-size:.68rem;color:var(--text-muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .data-card-value{font-size:1.3rem;font-weight:800;color:var(--text)}
    .data-card-sub{font-size:.72rem;color:var(--text-light);margin-top:3px}
    .asec{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
    .asec-title{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .signal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .signal-row:last-child{border-bottom:none}
    .signal-label{font-size:.82rem;color:var(--text-muted)}
    .sbadge{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:10px}
    .sbadge.bull{background:#d1fae5;color:#065f46}.sbadge.bear{background:#fee2e2;color:#991b1b}.sbadge.neutral{background:#f3f4f6;color:#6b7280}
    .pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .pred-box{border-radius:10px;padding:14px 12px;text-align:center}
    .pred-box-label{font-size:.68rem;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:5px}
    .pred-box-value{font-size:1.4rem;font-weight:800;color:#fff}
    .pbox-o{background:linear-gradient(135deg,#4f46e5,#7c3aed)}.pbox-h{background:linear-gradient(135deg,#059669,#0d9488)}
    .pbox-l{background:linear-gradient(135deg,#dc2626,#9f1239)}.pbox-c{background:linear-gradient(135deg,#d97706,#b45309)}
    .vol-meter{height:8px;border-radius:4px;background:var(--border);margin:8px 0;overflow:hidden}
    .vol-fill{height:100%;border-radius:4px}
    .anote{font-size:.76rem;color:var(--text-muted);line-height:1.7;padding:10px 12px;background:var(--bg);border-radius:8px;margin-top:10px}
    .adata-err{color:var(--danger);font-size:.8rem;padding:6px 0}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <div class="nav-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      <span id="brandName">股市追踪</span>
    </div>
    <div class="nav-actions">
      <a class="back-btn" href="index.html" id="backBtn">← <span id="backLabel">工具箱</span></a>

</nav>

<div class="main-content">
  <div class="stocks-header">
    <div>
      <h2 id="headerTitle">📈 股市追踪</h2>
      <p id="headerSubtitle">重要市场消息自动推送 · 周一至周五</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
      <div class="next-brief">
        <div class="next-brief-label" id="nextBriefLabel">下次早报</div>
        <div id="nextBriefTime">—</div>
      </div>
      <button class="refresh-btn" onclick="refreshCurrent()">🔄 <span id="refreshLabel">刷新</span></button>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabNews" onclick="switchTab('news')">📰 <span id="tabNewsLabel">市场消息</span></button>
    <button class="tab-btn" id="tabPos" onclick="switchTab('positions')">📋 <span id="tabPosLabel">持仓动向</span></button>
    <button class="tab-btn" id="tabAnalysis" onclick="switchTab('analysis')">📊 <span id="tabAnalysisLabel">市场分析</span></button>

    <div class="loading">加载中…</div>
  </div>

  </div>

    <div id="analysisInner"><div class="loading">正在获取市场数据…</div></div>
  </div>
</div>

<script>
'use strict';
if(sessionStorage.getItem('portal_auth')!=='ok'){window.location.href='index.html';}

firebase.initializeApp({
  apiKey:"AIzaSyCf1D8uYmBXgGFPrhvTQ9l_NwP-lDthQC4",
  authDomain:"dd-tools-d94eb.firebaseapp.com",
  projectId:"dd-tools-d94eb",
  storageBucket:"dd-tools-d94eb.firebasestorage.app",
  messagingSenderId:"803411935254",
  appId:"1:803411935254:web:9376e7e551efa2dd977537"
});
const _fs=firebase.firestore();

let lang=localStorage.getItem('sched_lang')||'zh';
let activeTab='news';

const LANG={
  zh:{
    brand:'股市追踪',headerTitle:'📈 股市追踪',headerSubtitle:'重要市场消息自动推送 · 周一至周五',
    nextBriefLabel:'下次早报',refresh:'刷新',back:'工具箱',langBtn:'EN',
    tabNews:'市场消息',tabPos:'持仓动向',tabAnalysis:'市场分析',
    breaking:'🚨 突发消息',scheduled:'⏰ 定时早报',
    insider:'📋 内部人交易',congress:'🏛️ 国会议员',
    buy:'买入',sell:'卖出',
    emptyNews:'暂无消息记录，后台追踪器将自动推送',
    emptyPos:'暂无持仓记录，追踪器将自动检测',
    loading:'加载中…'
  },
  en:{
    brand:'Market Tracker',headerTitle:'📈 Market Tracker',headerSubtitle:'Auto-push important news · Mon–Fri',
    nextBriefLabel:'Next Brief',refresh:'Refresh',back:'Toolbox',langBtn:'中文',
    tabNews:'Market News',tabPos:'Position Flow',tabAnalysis:'Analysis',
    breaking:'🚨 Breaking',scheduled:'⏰ Morning Brief',
    insider:'📋 Insider Trade',congress:'🏛️ Congress',
    buy:'Buy',sell:'Sell',
    emptyNews:'No alerts yet — tracker will push automatically',
    emptyPos:'No position data yet — tracker will detect automatically',
    loading:'Loading…'
  }
};

function applyLang(){
  const L=LANG[lang];
  document.getElementById('brandName').textContent=L.brand;
  document.getElementById('headerTitle').textContent=L.headerTitle;
  document.getElementById('headerSubtitle').textContent=L.headerSubtitle;
  document.getElementById('nextBriefLabel').textContent=L.nextBriefLabel;
  document.getElementById('refreshLabel').textContent=L.refresh;
  document.getElementById('backLabel').textContent=L.back;
  document.getElementById('langToggle').textContent=L.langBtn;
  document.getElementById('tabNewsLabel').textContent=L.tabNews;
  document.getElementById('tabPosLabel').textContent=L.tabPos;
  document.getElementById('tabAnalysisLabel').textContent=L.tabAnalysis;
  document.title=L.brand;
  updateNextBriefTime();
}
function toggleLang(){
  lang=lang==='zh'?'en':'zh';
  localStorage.setItem('sched_lang',lang);
  applyLang();
  renderAlerts(lastSnap);
  renderPositions(lastPosSnap);
}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabNews').classList.toggle('active',tab==='news');
  document.getElementById('tabPos').classList.toggle('active',tab==='positions');
  document.getElementById('tabAnalysis').classList.toggle('active',tab==='analysis');
  document.getElementById('alertList').classList.toggle('hidden',tab!=='news');
  document.getElementById('positionList').classList.toggle('hidden',tab!=='positions');
  document.getElementById('analysisPanel').classList.toggle('hidden',tab!=='analysis');
  if(tab==='positions'&&lastPosSnap===null)loadPositions();
  if(tab==='analysis')loadAnalysis();
}

function refreshCurrent(){
  if(activeTab==='news')loadAlerts();
  else if(activeTab==='positions')loadPositions();
  else{lastAnalysisTime=0;loadAnalysis();}
}

function updateNextBriefTime(){
  const now=new Date();
  const la=new Date(now.toLocaleString('en-US',{timeZone:'America/Los_Angeles'}));
  const day=la.getDay(),h=la.getHours(),m=la.getMinutes();
  const isWeekday=day>=1&&day<=5;
  const pastBrief=h>6||(h===6&&m>=25);
  let add=0;
  if(isWeekday&&!pastBrief){add=0;}        // 今天工作日且未到6:25 → 今天
  else if(day===5&&pastBrief){add=3;}      // 周五过后 → 下周一
  else if(day===6){add=2;}                 // 周六 → 下周一
  else if(day===0){add=1;}                 // 周日 → 周一
  else{add=1;}                             // 工作日过后 → 明天
  const next=new Date(la);next.setDate(la.getDate()+add);next.setHours(6,25,0,0);
  const opts={weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Los_Angeles'};
  document.getElementById('nextBriefTime').textContent=next.toLocaleString(lang==='zh'?'zh-CN':'en-US',opts)+' LA';
}

// ── Market News ────────────────────────────────────────────────────────
let lastSnap=null;
async function loadAlerts(){
  document.getElementById('alertList').innerHTML=`<div class="loading">${LANG[lang].loading}</div>`;
  try{
    const snap=await _fs.collection('stock-alerts').orderBy('timestamp','desc').limit(40).get();
    lastSnap=snap;
    renderAlerts(snap);
  }catch(e){
    document.getElementById('alertList').innerHTML=`<div class="stocks-empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;
  }
}
function renderAlerts(snap){
  const L=LANG[lang];
  const listEl=document.getElementById('alertList');
  if(!snap||snap.empty){listEl.innerHTML=`<div class="stocks-empty"><div class="empty-icon">📡</div><div>${L.emptyNews}</div></div>`;return;}
  listEl.innerHTML=snap.docs.map(doc=>{
    const d=doc.data();
    const ts=d.timestamp?.toDate?d.timestamp.toDate():new Date(d.timestamp||Date.now());
    const timeStr=ts.toLocaleString(lang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Los_Angeles'})+' LA';
    const isBreaking=d.type==='breaking';
    const imp=Math.min(5,Math.max(1,parseInt(d.importance)||1));
    const dots=Array.from({length:5},(_,i)=>`<span class="imp-dot${i<imp?' filled':''}"></span>`).join('');
    const badge=isBreaking?L.breaking:L.scheduled;
    return `<div class="alert-card ${d.type||''}">
      <div class="alert-meta">
        <span class="alert-badge ${d.type||''}">${badge}</span>
        <span class="alert-time">${timeStr}</span>
        ${d.source?`<span class="alert-source">${d.source}</span>`:''}
        <span class="imp-bar">${dots}</span>
      </div>
      <div class="alert-headline">${d.headline||''}</div>
      ${d.analysis?`<div class="alert-analysis">${d.analysis}</div>`:''}
    </div>`;
  }).join('');
}

// ── Position Flow ──────────────────────────────────────────────────────
let lastPosSnap=null;
async function loadPositions(){
  document.getElementById('positionList').innerHTML=`<div class="loading">${LANG[lang].loading}</div>`;
  try{
    const snap=await _fs.collection('position-alerts').orderBy('timestamp','desc').limit(60).get();
    lastPosSnap=snap;
    renderPositions(snap);
  }catch(e){
    document.getElementById('positionList').innerHTML=`<div class="stocks-empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;
  }
}
function renderPositions(snap){
  const L=LANG[lang];
  const listEl=document.getElementById('positionList');
  if(!snap||snap.empty){listEl.innerHTML=`<div class="stocks-empty"><div class="empty-icon">📡</div><div>${L.emptyPos}</div></div>`;return;}
  listEl.innerHTML=snap.docs.map(doc=>{
    const d=doc.data();
    const ts=d.timestamp?.toDate?d.timestamp.toDate():new Date(d.timestamp||Date.now());
    const timeStr=ts.toLocaleString(lang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Los_Angeles'})+' LA';
    const isCongress=d.type==='congress';
    const badgeLabel=isCongress?L.congress:L.insider;
    const isBuy=d.subtype==='buy'||(d.transaction||'').toLowerCase().includes('purchase');
    const actionCls=isBuy?'txt-buy':'txt-sell';
    const actionLabel=isBuy?L.buy:L.sell;

    let detail='';
    if(isCongress){
      const partyZh=d.party==='Republican'?'共和党':d.party==='Democrat'?'民主党':d.party||'';
      const partyEn=d.party||'';
      const partyStr=lang==='zh'?partyZh:partyEn;
      detail=`<div class="pos-detail">${d.person||''} ${partyStr?`(${partyStr})`:''} ${d.chamber||''}<br>交易日 ${d.tradeDate||'—'} · 申报日 ${d.reportDate||'—'}</div>`;
    } else {
      const fmt=v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+Math.round(v/1e3)+'K';
      const valStr=d.value?fmt(d.value):'';
      detail=`<div class="pos-detail">${d.person||''} · ${d.role||''}<br>${d.company||''} ${valStr?`· <span class="${actionCls}">${valStr}</span>`:''}</div>`;
    }

    return `<div class="pos-card ${d.type||''}">
      <div class="pos-meta">
        <span class="pos-badge ${d.type||''}">${badgeLabel}</span>
        ${d.ticker?`<span class="pos-ticker">$${d.ticker}</span>`:''}
        <span class="${actionCls}">${actionLabel}</span>
        ${isCongress&&d.range?`<span class="alert-source">${d.range}</span>`:''}
        <span class="alert-time">${timeStr}</span>
      </div>
      <div class="pos-headline">${d.headline||''}</div>
      ${detail}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  MARKET ANALYSIS ENGINE
// ══════════════════════════════════════════════
let lastAnalysisTime=0,lastAnalysisHTML='';

const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
];

async function fetchFB(url,ms=9000){
  const timeout=()=>new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms));
  // direct
  try{const r=await Promise.race([fetch(url,{cache:'no-store'}),timeout()]);if(r&&r.ok)return r;}catch(e){}
  // proxies
  for(const p of PROXIES){
    try{const r=await Promise.race([fetch(p(url),{cache:'no-store'}),timeout()]);if(r&&r.ok)return r;}catch(e){}
  }
  throw new Error('network');
}

async function fetchQuotes(){
  const syms=['^GSPC','ES=F','^VIX','^TNX','DX-Y.NYB','GC=F','CL=F'];
  const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms.map(encodeURIComponent).join('%2C')}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketPreviousClose,preMarketPrice,preMarketChange,preMarketChangePercent`;
  const r=await fetchFB(url);
  const json=await r.json();
  const out={};
  for(const q of json.quoteResponse?.result||[])out[q.symbol]=q;
  return out;
}

async function fetchDIXGEX(){
  const url='https://squeezemetrics.com/monitor/static/DIX.csv';
  const r=await fetchFB(url,12000);
  const text=await r.text();
  const lines=text.trim().split('\n').filter(l=>l.trim()&&!l.toLowerCase().startsWith('date'));
  return lines.slice(-5).map(l=>{
    const p=l.split(',');
    return{date:p[0]?.trim(),dix:parseFloat(p[1]),gex:parseFloat(p[2])};
  }).filter(d=>!isNaN(d.dix));
}

async function fetchPCRatio(){
  // Calculate from SPY options chain
  const url='https://query1.finance.yahoo.com/v7/finance/options/SPY';
  try{
    const r=await fetchFB(url,8000);
    const json=await r.json();
    const opt=json.optionChain?.result?.[0]?.options?.[0];
    if(!opt)return null;
    const pv=(opt.puts||[]).reduce((s,o)=>s+(o.volume||0),0);
    const cv=(opt.calls||[]).reduce((s,o)=>s+(o.volume||0),0);
    if(!cv)return null;
    return{ratio:+(pv/cv).toFixed(2),puts:pv,calls:cv,source:'SPY期权计算'};
  }catch(e){return null;}
}

function gexStr(g){
  if(!g||isNaN(g))return'—';
  const s=g>=0?'+':'-',a=Math.abs(g);
  return s+(a>=1e9?(a/1e9).toFixed(1)+'B':a>=1e6?(a/1e6).toFixed(0)+'M':a.toFixed(0));
}
function fmtPct(n,dec=2){return n!=null&&!isNaN(n)?(n>=0?'+':'')+n.toFixed(dec)+'%':'—';}
function fmtP(n){return n!=null&&!isNaN(n)?Math.round(n).toLocaleString():'—';}
function fmtN(n,d=2){return n!=null&&!isNaN(n)?n.toFixed(d):'—';}

function mkCard(label,val,sub,cls){
  return`<div class="data-card ${cls||''}"><div class="data-card-label">${label}</div><div class="data-card-value">${val}</div>${sub?`<div class="data-card-sub">${sub}</div>`:''}</div>`;
}

function buildSignals(dix,gex,pcRatio,futChgPct){
  let score=0;const sigs=[];
  if(dix!=null&&!isNaN(dix)){
    if(dix>45){score++;sigs.push({t:'bull',l:'DIX暗池买入 '+dix.toFixed(1)+'%'});}
    else if(dix<40){score--;sigs.push({t:'bear',l:'DIX暗池减少 '+dix.toFixed(1)+'%'});}
    else sigs.push({t:'neutral',l:'DIX中性 '+dix.toFixed(1)+'%'});
  }
  if(gex!=null&&!isNaN(gex)){
    if(gex>5e8){sigs.push({t:'bull',l:'正Gamma 市场稳定 '+gexStr(gex)});}
    else if(gex<-5e8){score--;sigs.push({t:'bear',l:'负Gamma 波动放大 '+gexStr(gex)});}
    else sigs.push({t:'neutral',l:'Gamma 中性 '+gexStr(gex)});
  }
  if(pcRatio!=null){
    if(pcRatio>1.05){score++;sigs.push({t:'bull',l:'P/C偏高(恐慌保护) '+pcRatio});}
    else if(pcRatio<0.70){score--;sigs.push({t:'bear',l:'P/C偏低(过度乐观) '+pcRatio});}
    else sigs.push({t:'neutral',l:'P/C正常 '+pcRatio});
  }
  if(futChgPct!=null&&!isNaN(futChgPct)){
    if(futChgPct>0.4){score++;sigs.push({t:'bull',l:'期货盘前上涨 '+fmtPct(futChgPct)});}
    else if(futChgPct<-0.4){score--;sigs.push({t:'bear',l:'期货盘前下跌 '+fmtPct(futChgPct)});}
    else sigs.push({t:'neutral',l:'期货小幅波动 '+fmtPct(futChgPct)});
  }
  return{score,sigs};
}

function calcPred(spxClose,vix,futPrice,futPrevClose,score,gex){
  if(!spxClose||!vix||!futPrice)return null;
  const dailySigma=spxClose*vix/100/Math.sqrt(252);
  const futDelta=(futPrice-(futPrevClose||futPrice));
  const estOpen=Math.round(spxClose+futDelta*0.95);
  const gexMult=gex>2e9?0.65:gex<-1e9?1.45:1.0;
  const range=dailySigma*1.6*gexMult;
  const bias=Math.max(-1,Math.min(1,score/3));
  const estHigh=Math.round(estOpen+range*(0.55+Math.max(0,bias)*0.3));
  const estLow=Math.round(estOpen-range*(0.55+Math.max(0,-bias)*0.3));
  const estClose=Math.round(estOpen+range*bias*0.45);
  const expMove=Math.round(range);
  const expMovePct=(range/spxClose*100).toFixed(2);
  return{estOpen,estHigh,estLow,estClose,expMove,expMovePct};
}

function renderAnalysisHTML(quotes,dixArr,pcData){
  const spx=quotes['^GSPC'],es=quotes['ES=F'],vix=quotes['^VIX'];
  const tny=quotes['^TNX'],dxy=quotes['DX-Y.NYB'];
  const gold=quotes['GC=F'],oil=quotes['CL=F'];

  const spxClose=spx?.regularMarketPreviousClose||spx?.regularMarketPrice;
  const futPrice=es?.regularMarketPrice;
  const futClose=es?.regularMarketPreviousClose;
  const futChgPct=es?.regularMarketChangePercent;
  const vixLevel=vix?.regularMarketPrice;
  const latest=dixArr[dixArr.length-1];

  const{score,sigs}=buildSignals(latest?.dix,latest?.gex,pcData?.ratio,futChgPct);
  const scoreTag=score>1?['看涨','bull']:score<-1?['看跌','bear']:['中性','neutral'];
  const pred=calcPred(spxClose,vixLevel,futPrice,futClose,score,latest?.gex);

  let h='';

  // ── 盘前数据 ──
  h+=`<div class="asec"><div class="asec-title">🌅 盘前核心数据 <span style="font-size:.72rem;color:var(--text-light);font-weight:400">Yahoo Finance 实时</span></div><div class="analysis-grid">`;
  const esPre=es?.preMarketPrice;
  const esPct=es?.preMarketChangePercent;
  h+=mkCard('ES 期货',esPre?fmtP(esPre):fmtP(futPrice),esPre?fmtPct(esPct)+' 盘前':fmtPct(futChgPct),(esPct??futChgPct)>=0?'up':'down');
  h+=mkCard('SPX 昨收',fmtP(spxClose),spx?fmtPct(spx.regularMarketChangePercent)+' 昨日':'','');
  h+=mkCard('VIX 恐慌指数',fmtN(vixLevel,1),vixLevel>25?'⚠️ 高波动':vixLevel>18?'中性':'😌 低波动',vixLevel>20?'down':vixLevel<15?'up':'');
  h+=mkCard('10Y 美债',fmtN(tny?.regularMarketPrice,3)+'%',fmtPct(tny?.regularMarketChangePercent),tny?.regularMarketChangePercent>=0?'down':'up');
  h+=mkCard('美元指数 DXY',fmtN(dxy?.regularMarketPrice,2),fmtPct(dxy?.regularMarketChangePercent),'');
  h+=mkCard('黄金 Gold','$'+fmtP(gold?.regularMarketPrice),fmtPct(gold?.regularMarketChangePercent),gold?.regularMarketChangePercent>=0?'up':'down');
  h+=mkCard('原油 WTI','$'+fmtN(oil?.regularMarketPrice,1),fmtPct(oil?.regularMarketChangePercent),oil?.regularMarketChangePercent>=0?'up':'down');
  h+=`</div></div>`;

  // ── DIX / GEX ──
  h+=`<div class="asec"><div class="asec-title">🌑 暗池 · Gamma 数据 <span style="font-size:.72rem;color:var(--text-light);font-weight:400">SqueezeMetrics</span></div>`;
  if(dixArr.length){
    h+=`<div class="analysis-grid">`;
    h+=mkCard('DIX 暗池指数',fmtN(latest?.dix,1)+'%',latest?.date||'',latest?.dix>45?'up':latest?.dix<40?'down':'');
    h+=mkCard('GEX Gamma暴露',gexStr(latest?.gex),latest?.gex>0?'正Gamma 稳定':'负Gamma 放大',latest?.gex>0?'up':'down');
    h+=`</div>`;
    if(dixArr.length>1){
      h+=`<div style="font-size:.78rem;color:var(--text-muted);margin-bottom:8px">近期趋势：`;
      h+=dixArr.map(d=>`<span style="margin-right:10px">${d.date?.slice(5)||''} DIX ${fmtN(d.dix,1)}% / GEX ${gexStr(d.gex)}</span>`).join('');
      h+=`</div>`;
    }
    h+=`<div class="anote">📌 <strong>DIX > 45%</strong> = 暗池大量买入（机构看涨信号）；<strong>DIX < 40%</strong> = 机构撤退，谨慎。<br>📌 <strong>正GEX</strong> = 做市商多Gamma，市场会自动回归，波动被压制；<strong>负GEX</strong> = 做市商空Gamma，行情被放大，可能出现大单边行情。</div>`;
  }else{
    h+=`<div class="adata-err">⚠️ DIX/GEX 获取失败 → <a href="https://squeezemetrics.com/monitor" target="_blank" style="color:var(--primary)">手动查看</a></div>`;
  }
  h+=`</div>`;

  // ── 期权分析 ──
  h+=`<div class="asec"><div class="asec-title">⚙️ 期权 Put/Call 分析</div>`;
  if(pcData){
    h+=`<div class="analysis-grid">`;
    h+=mkCard('Put/Call 比率',fmtN(pcData.ratio,2),pcData.source,pcData.ratio>1?'up':pcData.ratio<0.7?'down':'');
    h+=mkCard('Put 成交量',pcData.puts?.toLocaleString()||'—','','');
    h+=mkCard('Call 成交量',pcData.calls?.toLocaleString()||'—','','');
    h+=`</div>`;
    h+=`<div class="anote">📌 <strong>P/C > 1.05</strong> = 市场大量买保护（恐慌）→ 反向信号往往看涨；<strong>P/C < 0.70</strong> = 市场过度乐观 → 潜在下跌风险。当前：${pcData.ratio>1.05?'📈 Put偏多，反向偏多':pcData.ratio<0.70?'📉 Call偏多，注意风险':'⚖️ 正常区间'}。</div>`;
  }else{
    h+=`<div class="signal-row"><div class="signal-label">P/C 数据</div><div><span class="adata-err">获取失败</span> <a href="https://www.cboe.com/us/options/market_statistics/daily/" target="_blank" style="font-size:.78rem;color:var(--primary)">CBOE 手动查看</a></div></div>`;
  }
  h+=`</div>`;

  // ── 综合信号 ──
  h+=`<div class="asec"><div class="asec-title">🔍 综合信号分析</div>`;
  for(const s of sigs){
    h+=`<div class="signal-row"><div class="signal-label">${s.l}</div><div><span class="sbadge ${s.t}">${s.t==='bull'?'📈 看涨':s.t==='bear'?'📉 看跌':'⚖️ 中性'}</span></div></div>`;
  }
  h+=`</div>`;

  // ── 预测 ──
  h+=`<div class="asec"><div class="asec-title">🎯 今日 SPX 预测 <span class="sbadge ${scoreTag[1]}" style="margin-left:8px">${scoreTag[0]}</span></div>`;
  if(pred){
    const vPct=Math.min(100,parseFloat(pred.expMovePct)/3*100);
    const vCol=vPct>66?'#ef4444':vPct>33?'#f59e0b':'#10b981';
    h+=`<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:4px"><span style="color:var(--text-muted)">预计日内波幅</span><span style="font-weight:700;color:${vCol}">±${pred.expMove}点 (${pred.expMovePct}%)</span></div>`;
    h+=`<div class="vol-meter"><div class="vol-fill" style="width:${vPct}%;background:${vCol}"></div></div>`;
    h+=`<div class="pred-grid">
      <div class="pred-box pbox-o"><div class="pred-box-label">🔔 预计开盘</div><div class="pred-box-value">${fmtP(pred.estOpen)}</div></div>
      <div class="pred-box pbox-h"><div class="pred-box-label">🟢 预计最高</div><div class="pred-box-value">${fmtP(pred.estHigh)}</div></div>
      <div class="pred-box pbox-l"><div class="pred-box-label">🔴 预计最低</div><div class="pred-box-value">${fmtP(pred.estLow)}</div></div>
      <div class="pred-box pbox-c"><div class="pred-box-label">🏁 预计收盘</div><div class="pred-box-value">${fmtP(pred.estClose)}</div></div>
    </div>`;
    const big=parseFloat(pred.expMovePct)>1.5;
    const negG=latest?.gex<-5e8;
    h+=`<div class="anote" style="margin-top:12px">
      ${big||negG?'⚠️ <strong>今日波动预警：</strong>':'✅ <strong>今日波动预计正常：</strong>'}
      ${big?'VIX偏高意味着市场预期较大波动。':''}${negG?'负Gamma环境下行情容易被放大。':''}
      <br><br>📐 <strong>预测方法：</strong>开盘 = SPX昨收 + ES期货溢价；日内区间 = VIX隐含波动率 × GEX修正系数；方向偏向由 DIX + P/C + 期货方向综合评分(${score>0?'+':''}${score}分)决定。
      <br><span style="color:var(--danger)">⚠️ 仅供参考，不构成投资建议。实际走势可能与预测偏差较大。</span>
    </div>`;
  }else{
    h+=`<div class="adata-err" style="padding:16px 0;text-align:center">市场数据不足，无法生成预测。请检查网络或等待盘前开始后刷新。</div>`;
  }
  h+=`</div>`;

  h+=`<div style="text-align:center;font-size:.72rem;color:var(--text-light);padding:8px 0">数据更新: ${new Date().toLocaleTimeString('zh-CN')} · 盘前数据，每次点刷新获取最新</div>`;
  return h;
}

async function loadAnalysis(){
  const now=Date.now();
  if(lastAnalysisHTML&&now-lastAnalysisTime<4*60*1000){
    document.getElementById('analysisInner').innerHTML=lastAnalysisHTML;return;
  }
  document.getElementById('analysisInner').innerHTML=`<div class="loading">📡 正在获取实时市场数据…</div>`;
  const[qr,dr,pr]=await Promise.allSettled([fetchQuotes(),fetchDIXGEX(),fetchPCRatio()]);
  const quotes=qr.status==='fulfilled'?qr.value:{};
  const dix=dr.status==='fulfilled'?dr.value:[];
  const pc=pr.status==='fulfilled'?pr.value:null;
  if(!Object.keys(quotes).length&&!dix.length){
    document.getElementById('analysisInner').innerHTML=`<div class="stocks-empty"><div class="empty-icon">🌐</div><div>数据获取失败，请检查网络连接后刷新</div></div>`;
    return;
  }
  lastAnalysisHTML=renderAnalysisHTML(quotes,dix,pc);
  lastAnalysisTime=now;
  document.getElementById('analysisInner').innerHTML=lastAnalysisHTML;
}
