<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>我的工具箱</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#4f46e5;--primary-dark:#3730a3;--primary-light:#e0e7ff;
      --accent:#06b6d4;--success:#10b981;--danger:#ef4444;
      --bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;
      --text-muted:#64748b;--text-light:#94a3b8;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:0 10px 40px rgba(0,0,0,.15);
      --radius:12px;--radius-sm:8px;--transition:.2s ease;
    }
    html{font-size:15px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .hidden{display:none!important}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-ghost{background:transparent;color:var(--text-muted);padding:6px 10px}
    .btn-ghost:hover{background:var(--border);color:var(--text)}
    .btn-sm{padding:5px 12px;font-size:.8rem}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-label{font-size:.8rem;font-weight:600;color:var(--text-muted)}
    .form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.875rem;color:var(--text);background:#fff;transition:border-color var(--transition),box-shadow var(--transition);outline:none}
    .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
    /* Login */
    #loginScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#4f46e5 100%);display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{background:rgba(255,255,255,.97);border-radius:20px;padding:44px 40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);animation:slideUp .5s ease}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .login-logo{text-align:center;margin-bottom:28px}
    .logo-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--accent));display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
    .logo-icon svg{width:32px;height:32px;color:#fff}
    .login-logo h1{font-size:1.5rem;font-weight:700;color:var(--text)}
    .login-logo p{font-size:.85rem;color:var(--text-muted);margin-top:4px}
    .login-form{display:flex;flex-direction:column;gap:18px}
    .pw-wrapper{position:relative}
    .pw-wrapper .form-control{padding-right:42px}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);display:flex;align-items:center}
    #loginError{background:#fee2e2;color:#991b1b;border-radius:var(--radius-sm);padding:9px 12px;font-size:.82rem;text-align:center}
    /* Portal */
    #portalScreen{min-height:100vh;display:flex;flex-direction:column}
    .portal-nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .portal-nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px;height:58px}
    .nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;color:var(--primary)}
    .nav-brand-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center}
    .nav-brand-icon svg{width:18px;height:18px;color:#fff}
    .nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
    .avatar-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));border:none;cursor:pointer;color:#fff;font-weight:700;font-size:.875rem;display:flex;align-items:center;justify-content:center}
    .portal-main{flex:1;max-width:1200px;width:100%;margin:0 auto;padding:40px 16px}
    .portal-greeting{margin-bottom:32px}
    .portal-greeting h2{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:6px}
    .portal-greeting p{color:var(--text-muted);font-size:.9rem}
    .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
    .tool-card{background:var(--card);border-radius:16px;padding:24px;box-shadow:var(--shadow);cursor:pointer;transition:all var(--transition);text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;border:2px solid transparent}
    .tool-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary-light)}
    .tool-card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
    .tool-card-icon.schedule{background:var(--primary-light)}
    .tool-card-icon.stocks{background:#d1fae5}
    .tool-card h3{font-size:1rem;font-weight:700;color:var(--text)}
    .tool-card p{font-size:.82rem;color:var(--text-muted);line-height:1.5}
    .tool-card-arrow{margin-top:auto;color:var(--primary);font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:4px}
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="10"/>
        </svg>
      </div>
      <h1 id="portalTitle">我的工具箱</h1>
      <p id="portalSubtitle">请输入密码以继续</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label class="form-label" id="pwLabel">访问密码</label>
        <div class="pw-wrapper">
          <input id="loginPwInput" type="password" class="form-control" placeholder="请输入密码" autocomplete="current-password"/>
          <button class="pw-toggle" type="button" onclick="togglePwVis()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="loginError" class="hidden"></div>
      <button id="loginBtn" class="btn btn-primary" onclick="doLogin()" style="padding:11px;width:100%">Loading…</button>
    </div>
  </div>
</div>

<div id="portalScreen" class="hidden">
  <nav class="portal-nav">
    <div class="portal-nav-inner">
      <div class="nav-brand">
        <div class="nav-brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
        </div>
        <span id="brandName">我的工具箱</span>
      </div>
      <div class="nav-actions">
        <button class="btn btn-ghost btn-sm" id="langToggle" onclick="toggleLang()" style="font-weight:700;min-width:42px">EN</button>
        <button class="avatar-btn" onclick="doLogout()" title="退出">退</button>
      </div>
    </div>
  </nav>
  <div class="portal-main">
    <div class="portal-greeting">
      <h2 id="greetingTitle">欢迎回来 👋</h2>
      <p id="greetingSubtitle">选择一个工具开始使用</p>
    </div>
    <div class="tools-grid">
      <a class="tool-card" href="schedule.html">
        <div class="tool-card-icon schedule">📅</div>
        <div>
          <h3 id="cardScheduleTitle">排班系统</h3>
          <p id="cardScheduleDesc">员工排班管理、工时统计与报表</p>
        </div>
        <div class="tool-card-arrow">进入 →</div>
      </a>
      <a class="tool-card" href="stocks.html">
        <div class="tool-card-icon stocks">📈</div>
        <div>
          <h3 id="cardStocksTitle">股市追踪</h3>
          <p id="cardStocksDesc">美股重要消息推送，每日早报</p>
        </div>
        <div class="tool-card-arrow">进入 →</div>
      </a>
    </div>
  </div>
</div>

<script>
'use strict';
firebase.initializeApp({
  apiKey:"AIzaSyCf1D8uYmBXgGFPrhvTQ9l_NwP-lDthQC4",
  authDomain:"dd-tools-d94eb.firebaseapp.com",
  projectId:"dd-tools-d94eb",
  storageBucket:"dd-tools-d94eb.firebasestorage.app",
  messagingSenderId:"803411935254",
  appId:"1:803411935254:web:9376e7e551efa2dd977537"
});
const _db=firebase.firestore();
const _docRef=_db.collection('app').doc('data');
let _pwHash=null;

const LANG={
  zh:{title:'我的工具箱',subtitle:'请输入密码以继续',pwLabel:'访问密码',pwPh:'请输入密码',
    loginBtn:'登 录',errEmpty:'请输入密码',errWrong:'密码错误，请重试',
    greeting:'欢迎回来 👋',greetingSub:'选择一个工具开始使用',lang:'EN',
    cardScheduleTitle:'排班系统',cardScheduleDesc:'员工排班管理、工时统计与报表',
    cardStocksTitle:'股市追踪',cardStocksDesc:'美股重要消息推送，每日早报',
    enter:'进入 →'},
  en:{title:'My Toolbox',subtitle:'Enter password to continue',pwLabel:'Password',pwPh:'Enter password',
    loginBtn:'Log In',errEmpty:'Please enter a password',errWrong:'Incorrect password',
    greeting:'Welcome back 👋',greetingSub:'Choose a tool to get started',lang:'中文',
    cardScheduleTitle:'Scheduling',cardScheduleDesc:'Employee shifts, hours & reports',
    cardStocksTitle:'Market Tracker',cardStocksDesc:'US market alerts & daily brief',
    enter:'Open →'}
};
let lang=localStorage.getItem('sched_lang')||'zh';

function applyLang(){
  const L=LANG[lang];
  document.getElementById('portalTitle').textContent=L.title;
  document.getElementById('portalSubtitle').textContent=L.subtitle;
  document.getElementById('pwLabel').textContent=L.pwLabel;
  document.getElementById('loginPwInput').placeholder=L.pwPh;
  document.getElementById('brandName').textContent=L.title;
  document.getElementById('greetingTitle').textContent=L.greeting;
  document.getElementById('greetingSubtitle').textContent=L.greetingSub;
  document.getElementById('langToggle').textContent=L.lang;
  document.getElementById('cardScheduleTitle').textContent=L.cardScheduleTitle;
  document.getElementById('cardScheduleDesc').textContent=L.cardScheduleDesc;
  document.getElementById('cardStocksTitle').textContent=L.cardStocksTitle;
  document.getElementById('cardStocksDesc').textContent=L.cardStocksDesc;
  document.querySelectorAll('.tool-card-arrow').forEach(el=>el.textContent=L.enter);
  const loginBtn=document.getElementById('loginBtn');
  if(!loginBtn.disabled)loginBtn.textContent=L.loginBtn;
  document.title=L.title;
}
function toggleLang(){lang=lang==='zh'?'en':'zh';localStorage.setItem('sched_lang',lang);applyLang();}

async function sha256(msg){const buf=new TextEncoder().encode(msg);const hash=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');}

async function doLogin(){
  const pw=document.getElementById('loginPwInput').value;
  const errEl=document.getElementById('loginError');
  const L=LANG[lang];
  if(!pw){errEl.textContent=L.errEmpty;errEl.classList.remove('hidden');return;}
  const hash=await sha256(pw);
  if(hash!==_pwHash){errEl.textContent=L.errWrong;errEl.classList.remove('hidden');return;}
  errEl.classList.add('hidden');
  sessionStorage.setItem('portal_auth','ok');
  showPortal();
}
function showPortal(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('portalScreen').classList.remove('hidden');
}
function doLogout(){
  sessionStorage.removeItem('portal_auth');
  document.getElementById('portalScreen').classList.add('hidden');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginPwInput').value='';
}
function togglePwVis(){
  const inp=document.getElementById('loginPwInput');
  inp.type=inp.type==='password'?'text':'password';
}

async function startup(){
  applyLang();
  const loginBtn=document.getElementById('loginBtn');
  try{
    const snap=await _docRef.get();
    if(snap.exists)_pwHash=snap.data().pwHash||null;
    if(!_pwHash){
      const DEFAULT_PASSWORD='DD168168';
      _pwHash=await sha256(DEFAULT_PASSWORD);
      await _docRef.set({pwHash:_pwHash},{merge:true});
    }
  }catch(e){console.error(e);}
  loginBtn.disabled=false;
  const L=LANG[lang];
  loginBtn.textContent=L.loginBtn;
  if(sessionStorage.getItem('portal_auth')==='ok')showPortal();
}

document.getElementById('loginPwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
startup();
</script>
</body>
</html>
