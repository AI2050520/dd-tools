<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>排班管理系统</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3; --primary-light: #e0e7ff;
      --accent: #06b6d4; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0; --text: #1e293b;
      --text-muted: #64748b; --text-light: #94a3b8;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.15);
      --radius: 12px; --radius-sm: 8px; --transition: .2s ease;
    }
    html { font-size: 15px; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .hidden { display: none !important; }
    .w-full { width: 100%; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 18px; border: none; border-radius: var(--radius-sm); font-size: .875rem; font-weight: 600; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #059669; }
    .btn-ghost { background: transparent; color: var(--text-muted); padding: 6px 10px; }
    .btn-ghost:hover { background: var(--border); color: var(--text); }
    .btn-sm { padding: 5px 12px; font-size: .8rem; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: .8rem; font-weight: 600; color: var(--text-muted); }
    .form-control { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: .875rem; color: var(--text); background: #fff; transition: border-color var(--transition), box-shadow var(--transition); outline: none; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    select.form-control { cursor: pointer; }
    #loginScreen { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #4f46e5 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    #loginScreen.fade-out { animation: fadeOut .4s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
    .login-card { background: rgba(255,255,255,.97); border-radius: 20px; padding: 44px 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); animation: slideUp .5s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .logo-icon { width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    .login-logo .logo-icon svg { width: 32px; height: 32px; color: #fff; }
    .login-logo h1 { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .login-logo p { font-size: .85rem; color: var(--text-muted); margin-top: 4px; }
    .login-form { display: flex; flex-direction: column; gap: 18px; }
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-control { padding-right: 42px; }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; }
    .pw-toggle:hover { color: var(--primary); }
    #loginError { background: #fee2e2; color: #991b1b; border-radius: var(--radius-sm); padding: 9px 12px; font-size: .82rem; text-align: center; border: 1px solid #fecaca; }
    #appContainer { min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 0 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .navbar-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 12px; height: 58px; }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; color: var(--primary); flex-shrink: 0; }
    .nav-brand .brand-icon { width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; }
    .nav-brand .brand-icon svg { width: 18px; height: 18px; color: #fff; }
    .nav-tabs { display: flex; gap: 4px; flex: 1; margin-left: 12px; }
    .nav-tab { padding: 6px 16px; border-radius: 8px; font-size: .875rem; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all var(--transition); border: none; background: transparent; display: flex; align-items: center; gap: 6px; }
    .nav-tab:hover { background: var(--bg); color: var(--text); }
    .nav-tab.active { background: var(--primary-light); color: var(--primary); }
    .nav-tab svg { width: 16px; height: 16px; }
    .nav-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .avatar-btn { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; cursor: pointer; color: #fff; font-weight: 700; font-size: .875rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .avatar-btn:hover { opacity: .85; }
    .main-content { flex: 1; max-width: 1400px; width: 100%; margin: 0 auto; padding: 20px 16px; }
    .week-nav { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .week-nav-title { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; text-align: center; }
    .week-nav-sub { font-size: .78rem; font-weight: 400; color: var(--text-muted); margin-left: 6px; }
    .schedule-grid-wrapper { overflow-x: auto; padding-bottom: 8px; }
    .schedule-grid { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 10px; min-width: 980px; }
    .day-col { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    .day-col.today .day-header { background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .day-col.today .day-header * { color: #fff !important; }
    .day-header { padding: 10px 12px; background: var(--bg); border-bottom: 1px solid var(--border); text-align: center; }
    .day-name { font-size: .78rem; font-weight: 700; color: var(--text-muted); }
    .day-date { font-size: 1.1rem; font-weight: 800; color: var(--text); margin: 2px 0; }
    .day-count { font-size: .72rem; color: var(--text-light); background: rgba(0,0,0,.05); border-radius: 10px; padding: 1px 6px; display: inline-block; }
    .day-shifts { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 120px; }
    .shift-card { border-radius: 8px; padding: 8px 10px; border-left: 3px solid var(--primary); background: var(--primary-light); cursor: pointer; transition: all var(--transition); position: relative; }
    .shift-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .shift-card:hover .shift-actions { opacity: 1; }
    .shift-emp { font-size: .82rem; font-weight: 700; color: var(--text); }
    .shift-time { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
    .shift-task { font-size: .72rem; color: var(--text-muted); background: rgba(255,255,255,.6); border-radius: 4px; padding: 2px 6px; margin-top: 4px; display: inline-block; }
    .shift-hours-badge { position: absolute; top: 6px; right: 8px; font-size: .7rem; font-weight: 700; color: #fff; background: rgba(0,0,0,.25); border-radius: 10px; padding: 1px 6px; }
    .shift-actions { position: absolute; bottom: 6px; right: 6px; display: flex; gap: 3px; opacity: 0; transition: opacity var(--transition); }
    .shift-act-btn { width: 22px; height: 22px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; }
    .shift-act-btn.edit { background: #e0e7ff; color: var(--primary); }
    .shift-act-btn.del { background: #fee2e2; color: var(--danger); }
    .shift-act-btn:hover { filter: brightness(.9); }
    .add-shift-btn { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 7px; margin: 4px 8px 8px; border: 1.5px dashed var(--border); border-radius: 8px; background: transparent; color: var(--text-light); font-size: .8rem; cursor: pointer; transition: all var(--transition); }
    .add-shift-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .report-section { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .report-section-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .report-section-title svg { width: 18px; height: 18px; color: var(--primary); }
    .filter-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .preset-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .preset-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: .8rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); transition: all var(--transition); }
    .preset-btn:hover, .preset-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .emp-select-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .emp-chip { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-size: .82rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); transition: all var(--transition); display: flex; align-items: center; gap: 6px; }
    .emp-chip.selected { color: #fff; border-color: transparent; }
    .emp-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .stats-table-wrapper { overflow-x: auto; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .stats-table th, .stats-table td { padding: 10px 14px; text-align: center; border-bottom: 1px solid var(--border); }
    .stats-table th { background: var(--bg); font-weight: 700; font-size: .78rem; color: var(--text-muted); position: sticky; top: 0; }
    .stats-table td:first-child, .stats-table th:first-child { text-align: left; }
    .stats-table tr:hover td { background: #f8fafc; }
    .stats-table .total-row td { font-weight: 700; background: var(--primary-light); color: var(--primary); border-top: 2px solid var(--primary); }
    .hours-cell { font-weight: 600; }
    .hours-bar-cell { min-width: 120px; }
    .hours-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .hours-bar { height: 6px; border-radius: 3px; background: var(--border); flex: 1; }
    .hours-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .5s ease; }
    .emp-label { display: flex; align-items: center; gap: 8px; }
    .emp-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .summary-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); margin-bottom: 16px; }
    .summary-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border-top: 3px solid var(--primary); }
    .summary-card-value { font-size: 1.8rem; font-weight: 800; color: var(--text); }
    .summary-card-label { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }
    .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(15,23,42,.55); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 16px; animation: fadeIn .2s ease; }
    #confirmModal { z-index: 600; }
    .tool-subnav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 16px; }
    .tool-subnav-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 4px; height: 42px; align-items: center; }
    .alert-list { display: flex; flex-direction: column; gap: 12px; }
    .alert-card { background: var(--card); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
    .alert-card.breaking { border-left-color: var(--danger); }
    .alert-card.scheduled { border-left-color: var(--accent); }
    .alert-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .alert-badge { font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .alert-badge.breaking { background: #fee2e2; color: var(--danger); }
    .alert-badge.scheduled { background: #cffafe; color: #0891b2; }
    .alert-time { font-size: .78rem; color: var(--text-muted); }
    .alert-source { font-size: .78rem; color: var(--text-light); background: var(--bg); border-radius: 6px; padding: 1px 7px; }
    .alert-stars { color: #f59e0b; font-size: .85rem; }
    .alert-headline { font-size: .95rem; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .alert-analysis { font-size: .82rem; color: var(--text-muted); line-height: 1.6; background: var(--bg); border-radius: 8px; padding: 10px 12px; }
    .stocks-header { background: linear-gradient(135deg, #064e3b, #065f46); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 16px; color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .stocks-header h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .stocks-header p { font-size: .82rem; opacity: .8; }
    .next-brief { background: rgba(255,255,255,.15); border-radius: 8px; padding: 8px 14px; font-size: .82rem; font-weight: 600; text-align: center; white-space: nowrap; }
    .next-brief-label { font-size: .7rem; opacity: .7; margin-bottom: 2px; }
    .stocks-empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .stocks-empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .imp-bar { display: inline-flex; gap: 2px; }
    .imp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .imp-dot.filled { background: #f59e0b; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box { background: var(--card); border-radius: 16px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); animation: slideUp .25s ease; max-height: 90vh; overflow-y: auto; }
    .modal-box.modal-sm { max-width: 360px; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
    .close-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all var(--transition); }
    .close-btn:hover { background: var(--border); color: var(--text); }
    .settings-section { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
    .settings-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .settings-section-title { font-size: .9rem; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .emp-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 8px; background: var(--bg); margin-bottom: 6px; }
    .emp-list-item .emp-name-display { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: .875rem; }
    .confirm-msg { font-size: .9rem; color: var(--text-muted); line-height: 1.6; text-align: center; }
    #toastContainer { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { padding: 12px 18px; border-radius: 10px; background: #1e293b; color: #fff; font-size: .875rem; font-weight: 500; box-shadow: var(--shadow-lg); pointer-events: all; display: flex; align-items: center; gap: 10px; animation: toastIn .3s ease; max-width: 320px; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(20px); } }
    #appContainer { animation: fadeIn .4s ease; }
    @media (max-width: 640px) {
      .login-card { padding: 32px 24px; }
      .nav-brand span { display: none; }
      .nav-tab span { display: none; }
      .nav-tab { padding: 6px 10px; }
      .main-content { padding: 12px 8px; }
      .filter-grid { grid-template-columns: 1fr; }
      .summary-cards { grid-template-columns: 1fr 1fr; }
      #toastContainer { bottom: 16px; right: 16px; left: 16px; }
      .toast { max-width: 100%; }
      .modal-box { max-height: 95vh; }
    }
    @media (max-width: 400px) { .summary-cards { grid-template-columns: 1fr; } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
        </svg>
      </div>
      <h1 data-i18n="appName">排班管理系统</h1>
      <p data-i18n="loginSubtitle">请输入密码以继续</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label class="form-label" data-i18n="loginPwLabel">访问密码</label>
        <div class="pw-wrapper">
          <input id="loginPwInput" type="password" class="form-control" placeholder="请输入密码" data-i18n-ph="loginPwPh" autocomplete="current-password"/>
          <button class="pw-toggle" type="button" onclick="togglePwVisibility('loginPwInput',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="loginError" class="hidden">密码错误，请重试</div>
      <button class="btn btn-primary w-full" onclick="doLogin()" style="padding:11px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        登 录
      </button>
    </div>
  </div>
</div>

<div id="appContainer" class="hidden">
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="nav-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <span data-i18n="appName">排班管理系统</span>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" id="toolTabSchedule" onclick="switchTool('schedule')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span data-i18n="toolSchedule">排班系统</span>
        </button>
        <button class="nav-tab" id="toolTabStocks" onclick="switchTool('stocks')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          <span data-i18n="toolStocks">股市追踪</span>
        </button>
      </div>

async function sha256(msg){const buf=new TextEncoder().encode(msg);const hash=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function padZ(n){return String(n).padStart(2,'0');}
function toDateStr(d){return `${d.getFullYear()}-${padZ(d.getMonth()+1)}-${padZ(d.getDate())}`;}
function parseDate(str){const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);}
function getWeekStart(date){const d=new Date(date);const day=d.getDay();const diff=(day===0)?-6:1-day;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d;}
function fmtMMDD(date){return `${padZ(date.getMonth()+1)}/${padZ(date.getDate())}`;}
function calcHours(start,end){const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=24*60;return Math.round(mins/60*10)/10;}
function fmtHours(h){if(h===0)return '—';return `${h}h`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function changePassword(){
  const cur=document.getElementById('curPw').value;const np=document.getElementById('newPw').value;const np2=document.getElementById('newPw2').value;
  if(!cur||!np||!np2){showPwErr(t('errPwAll'));return;}
  if(np.length<6){showPwErr(t('errPwLen'));return;}
  if(np!==np2){showPwErr(t('errPwMatch'));return;}
  const curHash=await sha256(cur);if(curHash!==DB.getPwHash()){showPwErr(t('errPwWrong'));return;}
  DB.setPwHash(await sha256(np));document.getElementById('pwChangeError').classList.add('hidden');
  showToast(t('toastPwOk'),'success');['curPw','newPw','newPw2'].forEach(id=>document.getElementById(id).value='');
}
function showPwErr(msg){const el=document.getElementById('pwChangeError');el.textContent=msg;el.classList.remove('hidden');}
function renderEmpMgmtList(){
  const emps=DB.getEmployees();const list=document.getElementById('empMgmtList');
  if(emps.length===0){list.innerHTML=`<p style="font-size:.85rem;color:var(--text-muted)">${t('noEmpInList')}</p>`;return;}
  list.innerHTML=emps.map((e,i)=>`<div class="emp-list-item"><div class="emp-name-display"><div style="width:12px;height:12px;border-radius:50%;background:${getEmpColorByIndex(i)};flex-shrink:0"></div>${escHtml(e)}</div><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeEmployee('${escHtml(e)}')">${t('delEmpBtn')}</button></div>`).join('');
}
function addEmployee(){
  const input=document.getElementById('newEmpName');const errEl=document.getElementById('empMgmtError');const name=input.value.trim();
  if(!name){errEl.textContent=t('errEmpEmpty');errEl.classList.remove('hidden');return;}
  const emps=DB.getEmployees();if(emps.includes(name)){errEl.textContent=t('errEmpExists');errEl.classList.remove('hidden');return;}
  emps.push(name);DB.saveEmployees(emps);input.value='';errEl.classList.add('hidden');
  renderEmpMgmtList();renderEmpSelectList();showToast(t('toastEmpAdded').replace('%s',name),'success');
}
function removeEmployee(name){
  openConfirm(t('delEmpTitle'),t('delEmpMsg').replace('%s',name),()=>{
    DB.saveEmployees(DB.getEmployees().filter(e=>e!==name));selectedEmployees.delete(name);
    renderEmpMgmtList();renderEmpSelectList();renderReports();showToast(t('toastEmpDeleted').replace('%s',name),'success');
  });
}
function exportData(){
  const data={version:1,exportedAt:new Date().toISOString(),employees:DB.getEmployees(),shifts:DB.getShifts()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`排班数据_${toDateStr(new Date())}.json`;a.click();URL.revokeObjectURL(url);
  showToast(t('toastExported'),'success');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(!data.employees||!data.shifts)throw new Error();DB.saveEmployees(data.employees);DB.saveShifts(data.shifts);renderSchedule();renderEmpSelectList();renderReports();showToast(t('toastImported'),'success');}catch{showToast(t('toastImportFail'),'error');}};
  reader.readAsText(file);event.target.value='';
}
function clearAllData(){openConfirm(t('clearTitle'),t('clearMsg'),()=>{DB.saveShifts([]);renderSchedule();renderReports();showToast(t('toastCleared'),'success');});}

let currentTool='schedule';
function switchTool(tool){
  currentTool=tool;
  document.getElementById('toolTabSchedule').classList.toggle('active',tool==='schedule');
  document.getElementById('toolTabStocks').classList.toggle('active',tool==='stocks');
  document.getElementById('scheduleSubnav').classList.toggle('hidden',tool!=='schedule');
  document.getElementById('scheduleView').classList.toggle('hidden',tool!=='schedule');
  document.getElementById('reportsView').classList.toggle('hidden',true);
  document.getElementById('stocksView').classList.toggle('hidden',tool!=='stocks');
  if(tool==='stocks'){loadStockAlerts();updateNextBriefTime();}
}
function switchTab(tab){
  document.getElementById('subTabSchedule').classList.toggle('active',tab==='schedule');
  document.getElementById('subTabReports').classList.toggle('active',tab==='reports');
  document.getElementById('scheduleView').classList.toggle('hidden',tab!=='schedule');
  document.getElementById('reportsView').classList.toggle('hidden',tab!=='reports');
  if(tab==='reports')renderReports();
}
function updateNextBriefTime(){
  const now=new Date();
  const la=new Date(now.toLocaleString('en-US',{timeZone:'America/Los_Angeles'}));
  const day=la.getDay();const h=la.getHours();const m=la.getMinutes();
  let daysUntil=((1-day+7)%7)||((h>6||(h===6&&m>=25))?7:0);
  const next=new Date(la);next.setDate(la.getDate()+daysUntil);next.setHours(6,25,0,0);
  const opts={weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Los_Angeles'};
  document.getElementById('nextBriefTime').textContent=next.toLocaleString(currentLang==='zh'?'zh-CN':'en-US',opts)+' LA';
}
async function loadStockAlerts(){
  const listEl=document.getElementById('alertList');
  try{
    const snap=await _fs.collection('stock-alerts').orderBy('timestamp','desc').limit(40).get();
    if(snap.empty){
      listEl.innerHTML=`<div class="stocks-empty"><div class="empty-icon">📡</div><div>${t('stocksEmpty')}</div></div>`;
      return;
    }
    listEl.innerHTML=snap.docs.map(doc=>{
      const d=doc.data();
      const ts=d.timestamp?.toDate?d.timestamp.toDate():new Date(d.timestamp);
      const timeStr=ts.toLocaleString(currentLang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'America/Los_Angeles'})+' LA';
      const isBreaking=d.type==='breaking';
      const imp=d.importance||1;
      const dots=Array.from({length:5},(_,i)=>`<span class="imp-dot${i<imp?' filled':''}"></span>`).join('');
      const badge=isBreaking?t('alertTypeBreaking'):t('alertTypeScheduled');
      return `<div class="alert-card ${d.type||''}">
        <div class="alert-meta">
          <span class="alert-badge ${d.type||''}">${badge}</span>
          <span class="alert-time">${timeStr}</span>
          <span class="alert-source">${d.source||''}</span>
          <span class="imp-bar">${dots}</span>
        </div>
        <div class="alert-headline">${d.headline||''}</div>
        ${d.analysis?`<div class="alert-analysis">${d.analysis}</div>`:''}
      </div>`;
    }).join('');
  }catch(e){listEl.innerHTML=`<div class="stocks-empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;}
}
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
let confirmCallback=null;
function openConfirm(title,msg,cb){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').textContent=msg;confirmCallback=cb;openModal('confirmModal');}
document.getElementById('confirmOkBtn').addEventListener('click',()=>{closeModal('confirmModal');if(confirmCallback){confirmCallback();confirmCallback=null;}});
['shiftModal','confirmModal','settingsModal','quickModal'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))closeModal(id);});});
document.getElementById('loginPwInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function showToast(msg,type='default'){
  const container=document.getElementById('toastContainer');const toast=document.createElement('div');
  const icon=type==='success'?'✅':type==='error'?'❌':type==='warning'?'⚠️':'ℹ️';
  toast.className=`toast ${type}`;toast.innerHTML=`<span>${icon}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(()=>{toast.style.animation='toastOut .3s ease forwards';setTimeout(()=>toast.remove(),300);},2800);
}

function seedSampleData(){
  if(DB.getEmployees().length>0)return;
  const emps=['张伟','李娜','王芳','赵磊','陈静'];DB.saveEmployees(emps);
  const shifts=[];const ws=getWeekStart(new Date());
  const tasks=['前台接待','配送','仓库管理','客服','培训','设备维护',''];
  const tmpls=[{s:'08:00',e:'16:00'},{s:'09:00',e:'18:00'},{s:'10:00',e:'19:00'},{s:'12:00',e:'20:00'},{s:'08:30',e:'17:30'}];
  for(let w=0;w>=-1;w--){
    for(let d=0;d<7;d++){
      const date=new Date(ws);date.setDate(date.getDate()+w*7+d);const dStr=toDateStr(date);
      emps.forEach((emp,ei)=>{
        if(Math.random()<0.82){
          const tmpl=tmpls[(ei+d)%tmpls.length];const task=tasks[Math.floor(Math.random()*tasks.length)];
          shifts.push({id:uid(),employeeName:emp,date:dStr,startTime:tmpl.s,endTime:tmpl.e,taskLabel:task});
        }
      });
    }
  }
  DB.saveShifts(shifts);
}

async function captureSchedule(){
  const btn=document.getElementById('screenshotBtn');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const grid=document.getElementById('scheduleGrid');
    const label=document.getElementById('weekRangeLabel').innerText;
    const canvas=await html2canvas(grid,{
      backgroundColor:'#f1f5f9',
      scale:2,
      useCORS:true,
      scrollX:0,scrollY:0,
      width:grid.scrollWidth,
      windowWidth:grid.scrollWidth+40
    });
    const link=document.createElement('a');
    const safe=label.replace(/[\/\\:*?"<>|]/g,'-');
    link.download=`排班表_${safe}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
  }catch(e){showToast('截图失败：'+e.message,'error');}
  btn.textContent='📷';btn.disabled=false;
}

(async function startup(){
  const loginBtn=document.getElementById('loginBtn');
  if(loginBtn){loginBtn.disabled=true;loginBtn.textContent='Loading...';}
  await DB.loadFromCloud();
  if(!DB.getPwHash())DB.setPwHash(await sha256(DEFAULT_PASSWORD));
  seedSampleData();
  applyI18n();
  if(loginBtn){loginBtn.disabled=false;loginBtn.textContent=t('loginBtn');}
  if(sessionStorage.getItem('sched_session')==='ok'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appContainer').classList.remove('hidden');
    isLoggedIn=true;initSchedule();initReports();
  }
})();
</script>
